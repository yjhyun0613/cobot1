<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doosan M0609 Flask Web Interface</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; }
        h1 { text-align: center; color: #1a5276; margin-bottom: 30px; font-weight: bold; }
        
        .container { display: flex; gap: 20px; justify-content: center; align-items: flex-start; max-width: 1200px; margin: 0 auto; }
        .panel { background-color: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; flex: 1; min-height: 600px; }
        
        h2 { font-size: 1.2em; color: #333; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px;}
        
        .input-group { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .input-group label { font-size: 0.9em; color: #555; }
        .input-group input { width: 100px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; text-align: right; }
        
        .section-title { font-weight: bold; font-size: 0.9em; margin: 20px 0 10px 0; color: #333; }
        
        button { width: 100%; padding: 10px; margin-top: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-movej { background-color: #2e86c1; }
        .btn-movel { background-color: #cb4335; }
        .btn-copy { background-color: #7f8c8d; }
        .btn-green { background-color: #27ae60; flex: 1; margin-top:0;}
        .btn-gray { background-color: #7f8c8d; flex: 1; margin-top:0;}
        .btn-home { background-color: #17a589; margin-top: 10px;}
        .btn-sync { background-color: #f1c40f; color: #333; margin-top: 10px;}
        .btn-row { display: flex; gap: 10px; margin-bottom: 10px; }

        .status-box, .log-box { border: 1px dashed #3498db; background-color: #ebf5fb; padding: 10px; border-radius: 4px; margin-top: 15px; font-size: 0.9em; }
        .log-box { background-color: #fff; height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.8em; white-space: pre-wrap; }
        .info-text { color: #2980b9; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Doosan M0609 API Web Interface</h1>
    <div class="container">
        
        <!-- 1. Joint Control Panel -->
        <div class="panel">
            <h2>Joint Control (MoveJ)</h2>
            <div id="joint-inputs">
                <div class="input-group"><label>J1 (deg):</label><input type="number" id="cmd-j1" value="0.000"></div>
                <div class="input-group"><label>J2 (deg):</label><input type="number" id="cmd-j2" value="0.000"></div>
                <div class="input-group"><label>J3 (deg):</label><input type="number" id="cmd-j3" value="90.000"></div>
                <div class="input-group"><label>J4 (deg):</label><input type="number" id="cmd-j4" value="0.000"></div>
                <div class="input-group"><label>J5 (deg):</label><input type="number" id="cmd-j5" value="90.000"></div>
                <div class="input-group"><label>J6 (deg):</label><input type="number" id="cmd-j6" value="0.000"></div>
            </div>
            <div class="section-title">Speed / Acc: (0 ~ 100)</div>
            <div class="input-group"><label>Velocity:</label><input type="number" id="cmd-j-vel" value="60"></div>
            <div class="input-group"><label>Acceleration:</label><input type="number" id="cmd-j-acc" value="60"></div>
            <button class="btn-movej" onclick="sendRobotCommand('movej')">MOVE(J)</button>
            <button class="btn-copy" onclick="syncCoordinates('joint')">COPY (현재 조인트 동기화)</button>
        </div>

        <!-- 2. Cartesian Control Panel -->
        <div class="panel">
            <h2>Cartesian Control (MoveL)</h2>
            <div id="cartesian-inputs">
                <div class="input-group"><label>X (mm):</label><input type="number" id="cmd-x" value="300.000"></div>
                <div class="input-group"><label>Y (mm):</label><input type="number" id="cmd-y" value="0.000"></div>
                <div class="input-group"><label>Z (mm):</label><input type="number" id="cmd-z" value="400.000"></div>
                <div class="input-group"><label>A (deg):</label><input type="number" id="cmd-a" value="90.000"></div>
                <div class="input-group"><label>B (deg):</label><input type="number" id="cmd-b" value="180.000"></div>
                <div class="input-group"><label>C (deg):</label><input type="number" id="cmd-c" value="90.000"></div>
            </div>
            <div class="section-title">Speed / Acc: (0 ~ 100)</div>
            <div class="input-group"><label>Velocity:</label><input type="number" id="cmd-l-vel" value="60"></div>
            <div class="input-group"><label>Acceleration:</label><input type="number" id="cmd-l-acc" value="60"></div>
            <button class="btn-movel" onclick="sendRobotCommand('movel')">MOVE(L)</button>
            <button class="btn-copy" onclick="syncCoordinates('cartesian')">COPY (현재 좌표 동기화)</button>
        </div>

        <!-- 3. 상태 및 도구 Panel -->
        <div class="panel">
            <h2>상태 및 도구</h2>
            <div class="btn-row">
                <!-- Flask 코드에 있는 tcp_check, tool_check 매칭 -->
                <button class="btn-green" onclick="sendRobotCommand('tcp_check')">TCP 확인</button>
                <button class="btn-gray" onclick="sendRobotCommand('tool_check')">Tool 확인</button>
            </div>
            <div class="btn-row">
                <!-- Flask 코드에 있는 tool_on, tool_off 매칭 -->
                <button class="btn-green" onclick="sendRobotCommand('tool_on')">Tool ON</button>
                <button class="btn-gray" onclick="sendRobotCommand('tool_off')">Tool OFF</button>
            </div>
            <button class="btn-home" onclick="sendRobotCommand('home')">HOME</button>
            <button class="btn-sync" onclick="syncCoordinates('all')">현재 좌표 동기화 (입력창으로)</button>

            <div class="status-box">
                <p><strong>DB 수신 상태 메시지:</strong> <br><span id="db-msg" style="color:red;">대기 중...</span></p>
                <p>TCP 준비 상태: <span id="st-tcp-ready" class="info-text">False</span></p>
                <p>Tool 준비 상태: <span id="st-tool-ready" class="info-text">False</span></p>
                <p>Gripper 모델: <span id="st-gripper" class="info-text">unknown</span></p>
                <p>Tool 무게: <span id="st-weight" class="info-text">0.0</span> kg</p>
            </div>

            <div class="log-box" id="robot-logs">
                <!-- API 요청/응답 로그가 여기에 출력됩니다 -->
            </div>
        </div>
    </div>

    <script>
        let currentRobotStatus = { joint_pos: [0,0,0,0,0,0], tcp_pos: [0,0,0,0,0,0] };

        // 로그창에 텍스트 추가하는 함수
        function addLog(message) {
            const logBox = document.getElementById('robot-logs');
            const timeStr = new Date().toLocaleTimeString('en-GB'); 
            logBox.innerHTML += `[${timeStr}] ${message}\n`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // Flask 백엔드로 명령 전송 (POST /api/robot)
        async function sendRobotCommand(commandStr) {
            const payload = {
                command: commandStr,
                pos: null,
                vel: 60,
                acc: 60
            };

            // movej 또는 movel인 경우 입력창에서 좌표와 속도/가속도를 읽어옵니다.
            if (commandStr === 'movej') {
                payload.pos = [
                    parseFloat(document.getElementById('cmd-j1').value),
                    parseFloat(document.getElementById('cmd-j2').value),
                    parseFloat(document.getElementById('cmd-j3').value),
                    parseFloat(document.getElementById('cmd-j4').value),
                    parseFloat(document.getElementById('cmd-j5').value),
                    parseFloat(document.getElementById('cmd-j6').value)
                ];
                payload.vel = parseFloat(document.getElementById('cmd-j-vel').value);
                payload.acc = parseFloat(document.getElementById('cmd-j-acc').value);
            } 
            else if (commandStr === 'movel') {
                payload.pos = [
                    parseFloat(document.getElementById('cmd-x').value),
                    parseFloat(document.getElementById('cmd-y').value),
                    parseFloat(document.getElementById('cmd-z').value),
                    parseFloat(document.getElementById('cmd-a').value),
                    parseFloat(document.getElementById('cmd-b').value),
                    parseFloat(document.getElementById('cmd-c').value)
                ];
                payload.vel = parseFloat(document.getElementById('cmd-l-vel').value);
                payload.acc = parseFloat(document.getElementById('cmd-l-acc').value);
            }

            addLog(`명령 전송 시도: ${commandStr}`);

            try {
                const response = await fetch('/api/robot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if(result.success) {
                    addLog(`성공: ${result.message}`);
                } else {
                    addLog(`오류: ${result.message}`);
                }
            } catch (error) {
                addLog(`네트워크 오류: ${error.message}`);
            }
        }

        // Flask 백엔드에서 현재 상태 가져오기 (GET /api/status)
        async function fetchRobotStatus() {
            try {
                const response = await fetch('/api/status');
                const result = await response.json();

                if (result.success && result.status) {
                    currentRobotStatus = result.status;
                    
                    // UI 상태 업데이트
                    document.getElementById('st-tcp-ready').innerText = currentRobotStatus.tcp_ready;
                    document.getElementById('st-tool-ready').innerText = currentRobotStatus.tool_ready;
                    document.getElementById('st-gripper').innerText = currentRobotStatus.gripper_model;
                    document.getElementById('st-weight').innerText = currentRobotStatus.tool_weight;
                    document.getElementById('db-msg').innerText = currentRobotStatus.message || "정상 수신 중";
                }
            } catch (error) {
                document.getElementById('db-msg').innerText = "Flask 서버와 연결 끊김";
            }
        }

        // 입력 폼에 현재 로봇 좌표 동기화 (COPY 기능)
        function syncCoordinates(type) {
            if (!currentRobotStatus.joint_pos || !currentRobotStatus.tcp_pos) {
                alert("상태 데이터를 아직 받지 못했습니다.");
                return;
            }

            if (type === 'joint' || type === 'all') {
                document.getElementById('cmd-j1').value = currentRobotStatus.joint_pos[0].toFixed(3);
                document.getElementById('cmd-j2').value = currentRobotStatus.joint_pos[1].toFixed(3);
                document.getElementById('cmd-j3').value = currentRobotStatus.joint_pos[2].toFixed(3);
                document.getElementById('cmd-j4').value = currentRobotStatus.joint_pos[3].toFixed(3);
                document.getElementById('cmd-j5').value = currentRobotStatus.joint_pos[4].toFixed(3);
                document.getElementById('cmd-j6').value = currentRobotStatus.joint_pos[5].toFixed(3);
            }

            if (type === 'cartesian' || type === 'all') {
                document.getElementById('cmd-x').value = currentRobotStatus.tcp_pos[0].toFixed(3);
                document.getElementById('cmd-y').value = currentRobotStatus.tcp_pos[1].toFixed(3);
                document.getElementById('cmd-z').value = currentRobotStatus.tcp_pos[2].toFixed(3);
                document.getElementById('cmd-a').value = currentRobotStatus.tcp_pos[3].toFixed(3);
                document.getElementById('cmd-b').value = currentRobotStatus.tcp_pos[4].toFixed(3);
                document.getElementById('cmd-c').value = currentRobotStatus.tcp_pos[5].toFixed(3);
            }
            addLog("UI 입력창에 현재 좌표를 동기화했습니다.");
        }

        // 1초마다 로봇 상태 업데이트 (Polling 방식)
        setInterval(fetchRobotStatus, 1000);
        
        // 페이지 로드 시 즉시 한 번 호출
        fetchRobotStatus();

    </script>
</body>
</html>
