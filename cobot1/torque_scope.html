<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-Axis Torque Oscilloscope</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body { margin: 0; padding: 10px; background-color: #111; color: white; font-family: sans-serif; }
        #scope { width: 100vw; height: 95vh; }
        .header { position: absolute; top: 10px; left: 20px; z-index: 10; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; color: #00ff00;">🦾 M0609 Joint Torque Scope</h2>
        <p style="margin:5px 0; font-size: 12px; color: #aaa;">Real-time 6-Channel Monitoring (Unit: Nm)</p>
    </div>
    <div id="scope"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://rokey-d-2-4c32a-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const joints = ['J1', 'J2', 'J3', 'J4', 'J5', 'J6'];
        const colors = ['#FF4136', '#FF851B', '#FFDC00', '#2ECC40', '#0074D9', '#B10DC9'];
        
        // 💡 x축(0)과 y축(0)을 모두 명시하여 초기화 (그래프가 멈추는 버그 해결)
        const data = joints.map((name, i) => ({
            x: [0], y: [0], type: 'scatter', mode: 'lines',
            line: { color: colors[i], width: 2 },
            name: name, xaxis: 'x', yaxis: `y${i + 1}`
        }));

        const layout = {
            grid: { rows: 6, columns: 1, pattern: 'independent' },
            paper_bgcolor: '#111', plot_bgcolor: '#222', showlegend: false,
            margin: { l: 50, r: 20, b: 20, t: 30 },
        };

        joints.forEach((_, i) => {
            const idx = i + 1;
            layout[`yaxis${idx}`] = { title: { text: `J${idx}`, font: { color: colors[i] } }, tickfont: { color: '#888' }, gridcolor: '#333' };
            layout[`xaxis${idx}`] = { showticklabels: false, gridcolor: '#333' };
        });

        Plotly.newPlot('scope', data, layout, { responsive: true });

        let counter = 0;

        onValue(ref(db, 'robot/dsr01/torques'), (snapshot) => {
            const val = snapshot.val();
            if (val && val.j1 !== undefined) {
                counter++;
                // 💡 브라우저 F12를 눌러서 'Console' 탭을 보면 수신 상태를 확인할 수 있습니다.
                console.log(`[${counter}] 데이터 수신 성공: J1=${val.j1}`); 
                
                const update = {
                    x: [[counter], [counter], [counter], [counter], [counter], [counter]],
                    y: [[val.j1], [val.j2], [val.j3], [val.j4], [val.j5], [val.j6]]
                };
                
                // 최근 100개 데이터 유지
                Plotly.extendTraces('scope', update, [0, 1, 2, 3, 4, 5], 100);
            }
        });
    </script>
</body>
</html>
